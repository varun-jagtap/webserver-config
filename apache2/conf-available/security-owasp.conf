# OWASP / hardened defaults for Apache 2.4 on Debian/Ubuntu
#
# Enable with:
#   sudo a2enconf security-owasp
#   sudo a2enmod headers
#   sudo systemctl reload apache2
#
# Note: Some headers (HSTS) should only be enabled on HTTPS vhosts.

# Hide Apache version / OS information
ServerTokens Prod
ServerSignature Off

# Reduce information leakage
FileETag None
TraceEnable Off

# Restrict request size (tune to your app)
# Helps mitigate request smuggling / DoS via huge headers/bodies.
LimitRequestBody 10485760
LimitRequestFieldSize 8190
LimitRequestFields 100

<IfModule headers_module>
  # Clickjacking protection
  Header always set X-Frame-Options "SAMEORIGIN"

  # XSS protection (legacy; modern browsers may ignore, but safe)
  Header always set X-XSS-Protection "1; mode=block"

  # Prevent MIME sniffing
  Header always set X-Content-Type-Options "nosniff"

  # Referrer policy
  Header always set Referrer-Policy "strict-origin-when-cross-origin"

  # Permissions Policy (tune per app)
  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

  # Content Security Policy (CSP) is highly app-specific; provide a safe starter.
  # WARNING: This may break apps using inline scripts/styles. Adjust as needed.
  #Header always set Content-Security-Policy "default-src 'self'"

  # HSTS: enable ONLY on HTTPS vhosts (recommended to set per-vhost)
  #Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" env=HTTPS
</IfModule>
