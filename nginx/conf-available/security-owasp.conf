# OWASP / hardened defaults for Nginx on Debian/Ubuntu
#
# Install / enable (Debian-style):
#   sudo install -m 0644 nginx/conf-available/security-owasp.conf /etc/nginx/conf-available/security-owasp.conf
#   sudo ln -sf /etc/nginx/conf-available/security-owasp.conf /etc/nginx/conf-enabled/security-owasp.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then in /etc/nginx/nginx.conf inside the `http {}` block ensure:
#   include /etc/nginx/conf-enabled/*.conf;
#
# Notes:
# - HSTS is intentionally NOT enabled globally; enable it only on TLS server blocks.
# - CSP is application-specific; a safe starter is provided but commented.

# Hide Nginx version
server_tokens off;

# Reduce info leakage
proxy_hide_header X-Powered-By;

# Basic security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Legacy XSS filter header (some browsers ignore; harmless)
add_header X-XSS-Protection "1; mode=block" always;

# CSP is app-specific; enable and tune per app
#add_header Content-Security-Policy "default-src 'self'" always;

# HSTS: enable ONLY in TLS server blocks
#add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Request limiting / hardening (tune for your app)
client_max_body_size 10m;
client_body_buffer_size 128k;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;

# Timeouts (tune to your app)
client_body_timeout 10s;
client_header_timeout 10s;
keepalive_timeout 65s;
send_timeout 10s;

# Disable some risky methods if not needed (uncomment to enforce)
# if ($request_method !~ ^(GET|HEAD|POST)$ ) { return 405; }
